<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>這是一個很正經的標題</title>
    <!-- 引入 Tailwind CSS 確保畫面美觀 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- 導覽列 -->
    <nav class="bg-gradient-to-r river bg-sky-600 to-teal-500 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-fish-fins mr-2"></i>學海無涯</h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm bg-white/20 px-3 py-1 rounded-full">⚡帳號登入⚡</span>
            </div>
        </div>
    </nav>

    <!-- 主畫面區塊 -->
    <main class="max-w-4xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- 左側：遊戲化即時回饋看板 -->
        <section class="md:col-span-1 space-y-6">
            <!-- 個人積分 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center">
                <h3 class="text-slate-500 font-medium text-sm mb-1">我的目前累積</h3>
                <div id="impact-points" class="text-4xl font-black text-sky-600 mb-1">0</div>
                <p class="text-xs text-slate-400 mb-4">影響力點數 (Impact Points)</p>
                <div class="w-full bg-slate-100 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-teal-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-[11px] text-slate-400 mt-2 text-left flex justify-between">
                    <span>Lv.1 初級守護者</span>
                    <span id="progress-text">再 30 點升級</span>
                </p>
            </div>

            <!-- 減碳勳章牆 -->
            <div id="badge-1" class="opacity-30 transition-opacity duration-500">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mx-auto text-amber-700 text-lg mb-1 shadow-inner border border-amber-200">
                    <i class="fa-solid fa-medal"></i> </div>
                <span class="text-[10px] block text-slate-500 font-medium">環保徽章</span>
            </div>

            <div id="badge-2" class="opacity-30 transition-opacity duration-500">
                <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-slate-500 text-lg mb-1 shadow-inner border border-slate-300">
                    <i class="fa-solid fa-medal"></i>
                </div>
                <span class="text-[10px] block text-slate-500 font-medium">超環保徽章</span>
            </div>

            <div id="badge-3" class="opacity-30 transition-opacity duration-500">
                <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mx-auto text-yellow-600 text-lg mb-1 shadow-inner border border-yellow-300">
                    <i class="fa-solid fa-medal"></i>
                </div>
                <span class="text-[10px] block text-slate-500 font-medium">超超超環保徽章</span>
            </div>
        </section>

        <!-- 右側：行動與任務區 -->
        <section class="md:col-span-2 space-y-6">
            <!-- 模組二的核心功能 1：行動懶人包（難易度選擇） -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-slate-700"><i class="fa-solid fa-wand-magic-sparkles text-indigo-500 mr-2"></i>行動懶人包模組</h3>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="switchMode('easy')" id="btn-easy" class="py-2 px-3 border-2 border-sky-500 bg-sky-50 text-sky-700 rounded-xl text-xs font-bold transition-all focus:outline-none">
                        🌱 簡易參與
                    </button>
                    <button onclick="switchMode('normal')" id="btn-normal" class="py-2 px-3 border border-slate-200 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all focus:outline-none">
                        🔥 進階挑戰
                    </button>
                    <button onclick="switchMode('hard')" id="btn-hard" class="py-2 px-3 border border-slate-200 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all focus:outline-none">
                        👑 地獄難度
                    </button>
                </div>
            </div>

            <!-- 模組二的核心功能 2：每日微型任務清單與拍照上傳 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-4"><i class="fa-solid fa-list-check text-teal-500 mr-2"></i>今日微型打卡任務</h3>
                
                <div id="task-container" class="space-y-4">
                    <!-- 任務內容將由 JavaScript 動態渲染 -->
                </div>
            </div>
        </section>

    </main>

    <!-- 簡易互動 JavaScript 邏輯 -->
    <script>
        // 點數與狀態資料庫
        let points = 0;
        const maxPoints = 30;

        // 行動懶人包的微型任務清單資料
        const taskDatabase = {
            easy: [
                { id: 1, text: "今日外食自備環保餐具", points: 10, done: false },
                { id: 2, text: "購買飲料自備循環杯或保溫杯", points: 10, done: false }
            ],
            normal: [
                { id: 3, text: "主動拒絕小吃店老闆提供的塑膠袋", points: 15, done: false },
                { id: 4, text: "一整天不購買任何瓶裝寶特瓶飲料", points: 15, done: false }
            ],
            hard: [
                { id: 5, text: "達成連續 24 小時零廢棄垃圾生活", points: 30, done: false },
                { id: 6, text: "自備保鮮盒前往傳統市場無痕買菜", points: 20, done: false }
            ]
        };

        let currentMode = 'easy';

        // 渲染任務列表
        function renderTasks() {
            const container = document.getElementById('task-container');
            container.innerHTML = '';

            taskDatabase[currentMode].forEach(task => {
                const taskDiv = document.createElement('div');
                taskDiv.className = `p-4 border ${task.done ? 'border-teal-200 bg-teal-50/40' : 'border-slate-100 bg-slate-50/50'} rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all`;
                
                taskDiv.innerHTML = `
                    <div class="flex items-start space-x-3">
                        <div class="mt-1 ${task.done ? 'text-teal-500' : 'text-slate-300'} text-lg">
                            <i class="${task.done ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle'}"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold ${task.done ? 'text-slate-400 line-through' : 'text-slate-700'}">${task.text}</p>
                            <span class="inline-block mt-1 text-[10px] bg-sky-100 text-sky-700 px-2 py-0.5 rounded-md font-bold">+${task.points} Impact Points</span>
                        </div>
                    </div>
                    <div>
                        ${task.done 
                            ? `<span class="text-xs font-bold text-teal-600 bg-teal-100 px-3 py-1.5 rounded-lg block text-center"><i class="fa-solid fa-image mr-1"></i>已成功上傳打卡</span>`
                            : `<label class="cursor-pointer block text-center text-xs font-bold text-white bg-sky-500 hover:bg-sky-600 px-3 py-1.5 rounded-lg shadow-sm transition-all">
                                    <i class="fa-solid fa-camera mr-1"></i>上傳行動照片
                                    <input type="file" accept="image/*" class="hidden" onchange="completeTask(${task.id})">
                            </label>`
                        }
                    </div>
                `;
                container.appendChild(taskDiv);
            });
        }

        // 切換懶人包模式
        function switchMode(mode) {
            currentMode = mode;
            ['easy', 'normal', 'hard'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                if (m === mode) {
                    btn.className = "py-2 px-3 border-2 border-sky-500 bg-sky-50 text-sky-700 rounded-xl text-xs font-bold transition-all focus:outline-none";
                } else {
                    btn.className = "py-2 px-3 border border-slate-200 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all focus:outline-none";
                }
            });
            renderTasks();
        }

        // 計算所有模式中，目前總共完成的任務數量
        function getTotalCompletedTasksCount() {
            let count = 0;
            Object.keys(taskDatabase).forEach(mode => {
                taskDatabase[mode].forEach(task => {
                    if (task.done) count++;
                });
            });
            return count;
        }

        // 核心邏輯：依據完成任務數量解鎖勳章
        function checkAndUnlockBadges() {
            const completedCount = getTotalCompletedTasksCount();

            // 勳章 1：累計完成 1 個任務解鎖
            if (completedCount >= 1) {
                document.getElementById('badge-1').classList.remove('opacity-30');
                document.getElementById('badge-1').classList.add('scale-105', 'font-bold');
            }
            // 勳章 2：累計完成 2 個任務解鎖
            if (completedCount >= 2) {
                document.getElementById('badge-2').classList.remove('opacity-30');
                document.getElementById('badge-2').classList.add('scale-105', 'font-bold');
            }
            // 勳章 3：累計完成 6 個任務解鎖
            if (completedCount >= 6) {
                document.getElementById('badge-3').classList.remove('opacity-30');
                document.getElementById('badge-3').classList.add('scale-105', 'font-bold');
            }
        }

        // 完成任務與即時回饋
        function completeTask(id) {
            const task = taskDatabase[currentMode].find(t => t.id === id);
            if (task && !task.done) {
                task.done = true;
                points += task.points;
                
                // 更新畫面點數
                document.getElementById('impact-points').innerText = points;
                
                // 更新進度條
                const pct = Math.min((points / maxPoints) * 100, 100);
                document.getElementById('progress-bar').style.width = `${pct}%`;
                
                if(points >= maxPoints) {
                    document.getElementById('progress-text').innerText = "已達成今日最高守護者級別！";
                } else {
                    document.getElementById('progress-text').innerText = `再 ${maxPoints - points} 點升級`;
                }

                // 執行數量檢查並解鎖對應勳章
                checkAndUnlockBadges();

                // 重新渲染列表
                renderTasks();
                
                // 彈出成功提示，並顯示目前累計完成幾項任務
                const totalDone = getTotalCompletedTasksCount();
                alert(`🎉 任務成功！獲得了 ${task.points} 點。目前累計完成 ${totalDone} 個減塑任務！`);
            }
        }

        // 初始啟動
        renderTasks();
    </script>
</body>
</html>
